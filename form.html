<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery Pickup Form</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">

</head>
<body>

  <main>
    <h1>Grocery Pickup Form</h1>
    <p class="required-note"><span aria-hidden="true">*</span> indicates a required field.</p>

    <form action="https://formspree.io/f/myknolgg" method="POST">

      <fieldset>
        <legend>Contact Information</legend>

        <label for="first-name">First Name <span aria-hidden="true">*</span></label>
        <input type="text" id="first-name" name="first-name" required>

        <label for="last-name">Last Name <span aria-hidden="true">*</span></label>
        <input type="text" id="last-name" name="last-name" required>

        <label for="email">Email <span aria-hidden="true">*</span></label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone">

        <label for="program">Program</label>
        <input type="text" id="program" name="program">
      </fieldset>

      <fieldset class="radio-group">
        <legend>Available Time for Picking Up Grocery <span aria-hidden="true">*</span></legend>

        <div class="radio-option">
          <input type="radio" id="morning" name="available-time" value="morning" required>
          <label for="morning">Morning</label>
        </div>

        <div class="radio-option">
          <input type="radio" id="afternoon" name="available-time" value="afternoon">
          <label for="afternoon">Afternoon</label>
        </div>

        <div class="radio-option">
          <input type="radio" id="evening" name="available-time" value="evening">
          <label for="evening">Evening</label>
        </div>

        <div class="radio-option">
          <input type="radio" id="weekend" name="available-time" value="weekend">
          <label for="weekend">Weekend</label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Additional Information</legend>

        <label for="pickup-date">Preferred Pickup Date</label>
        <input type="date" id="pickup-date" name="pickup-date">

        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="4"></textarea>
      </fieldset>

      <input type="submit" value="Submit">
    </form>
  </main>

</body>
</html>
